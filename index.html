function renderSoftware() {
  const el = document.getElementById('view-software');

  // Group outlets by zone
  const zoneGroups = {};
  state.outlets.forEach(o => {
    if (!o.zone) return;
    if (!zoneGroups[o.zone]) zoneGroups[o.zone] = [];
    zoneGroups[o.zone].push(o);
  });

  // Group by region (rolled up from zones)
  const regionGroups = {};
  state.outlets.forEach(o => {
    const region = o.region || zoneRegion(o.zone) || 'Unassigned';
    if (!regionGroups[region]) regionGroups[region] = [];
    regionGroups[region].push(o);
  });

  el.innerHTML = `
    <div class="view-header">
      <div><h2>Software Dominance</h2><p>Current POS software breakdown by zone and region, based on latest known outlet state.</p></div>
    </div>

    <h3 style="font-size:var(--text-xl);margin-bottom:var(--space-4);">By Region</h3>
    <div class="stack gap-4" style="margin-bottom:var(--space-10);">
      ${Object.keys(regionGroups).length === 0 ? '<div class="card empty-state"><p>No outlets with zones assigned yet.</p></div>' :
        Object.entries(regionGroups).sort((a,b) => b[1].length - a[1].length).map(([region, outlets]) => softwareBreakdownCard(region, outlets)).join('')}
    </div>

    <h3 style="font-size:var(--text-xl);margin-bottom:var(--space-4);">By Zone</h3>
    <div class="stack gap-4">
      ${Object.keys(zoneGroups).length === 0 ? '<div class="card empty-state"><p>No outlets with zones assigned yet.</p></div>' :
        Object.entries(zoneGroups).sort((a,b) => b[1].length - a[1].length).map(([zone, outlets]) => softwareBreakdownCard(zone, outlets)).join('')}
    </div>
  `;

  // Update matching bar segments/swatches directly on 'input' (fires
  // continuously while the native color picker is open) instead of a full
  // renderSoftware() re-render, which would tear out the input mid-drag and
  // close the picker after the first pixel. Persist on 'change' (fires once,
  // when the picker closes) — same split the Settings color picker uses.
  document.querySelectorAll('.software-dominance-color-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const key = inp.dataset.key;
      document.querySelectorAll(`.software-dominance-bar-segment[data-key="${key}"]`).forEach(seg => {
        seg.style.background = inp.value;
      });
      document.querySelectorAll(`.software-dominance-color-input[data-key="${key}"]`).forEach(other => {
        if (other !== inp) other.value = inp.value;
      });
    });
    inp.addEventListener('change', () => {
      state.softwareColors[inp.dataset.key] = inp.value;
      persist();
    });
  });
}

function softwareBreakdownCard(label, outlets) {
  // Group by normalized (lowercase, trimmed) key so "Ewity" / "ewity" / "EWITY"
  // count as one bucket, but keep the most common original spelling for display.
  const buckets = {}; // key -> { count, labelCounts: {label: n} }
  outlets.forEach(o => {
    const raw = (o.current_software || '').trim() || 'Unknown';
    const key = raw.toLowerCase();
    if (!buckets[key]) buckets[key] = { count: 0, labelCounts: {} };
    buckets[key].count++;
    buckets[key].labelCounts[raw] = (buckets[key].labelCounts[raw] || 0) + 1;
  });
  const total = outlets.length;
  const entries = Object.entries(buckets)
    .map(([key, b]) => {
      const displayLabel = Object.entries(b.labelCounts).sort((a, b) => b[1] - a[1])[0][0];
      return [displayLabel, b.count];
    })
    .sort((a, b) => b[1] - a[1]);
  return `
    <div class="card">
      <div class="cluster gap-3" style="justify-content:space-between;margin-bottom:var(--space-4);">
        <strong>${escapeHTML(label)}</strong>
        <span class="text-xs text-tertiary">${total} outlet${total !== 1 ? 's' : ''}</span>
      </div>
      <div class="bar-row" style="margin-bottom:var(--space-4);">
        <div class="bar-track">
          ${entries.map(([sw, count]) => `<div class="bar-segment software-dominance-bar-segment" data-key="${softwareColorKey(sw)}" style="width:${(count/total*100)}%;background:${colorForSoftware(sw)};" title="${escapeHTML(sw)}: ${count}"></div>`).join('')}
        </div>
      </div>
      <div class="cluster gap-4">
        ${entries.map(([sw, count]) => `
          <div class="cluster gap-2">
            <input type="color" class="software-dominance-color-input" data-key="${softwareColorKey(sw)}" value="${colorForSoftware(sw)}" title="Change ${escapeHTML(sw)}'s color" style="width:14px;height:14px;padding:0;border:none;border-radius:50%;background:none;cursor:pointer;">
            <span class="text-xs text-muted">${escapeHTML(sw)} — ${Math.round(count/total*100)}% (${count})</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* Distinct colors per intern so the same person reads consistently
   across the roster map and the legend. */
const INTERN_COLOR_PALETTE = ['#8B0000', '#3A6EA5', '#3A9E5F', '#D97706', '#6B4E9E', '#B5451F', '#2E8B8B', '#A8508A'];
function colorForIntern(name) {
  const idx = personNames().indexOf(name);
  if (idx === -1) return '#6B6B6B';
  return INTERN_COLOR_PALETTE[idx % INTERN_COLOR_PALETTE.length];
}

function drawRosterMap() {
  if (typeof L === 'undefined') {
    const container = document.getElementById('rosterMapContainer');
    if (container) container.innerHTML = '<div class="empty-state" style="padding:var(--space-8);"><p>Map library unavailable — check your connection. Assignments below still work normally.</p></div>';
    return;
  }
  try {
    drawRosterMapInner();
  } catch (err) {
    console.error('Roster map render failed:', err);
  }
}

function drawRosterMapInner() {
  if (!rosterMap) {
    rosterMap = L.map('rosterMapContainer', { scrollWheelZoom: true }).setView([4.1755, 73.5093], 12);
    L.tileLayer(mapTileURL(), {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(rosterMap);
  }

  const dayAssignments = state.assignments.filter(a => a.date === rosterDate && a.shift === rosterActiveShift);
  // zone -> list of intern names assigned this shift
  const zoneToInterns = {};
  dayAssignments.forEach(a => {
    if (!zoneToInterns[a.zone]) zoneToInterns[a.zone] = [];
    zoneToInterns[a.zone].push(a.intern);
  });

  const bounds = [];
  const zonesWithBoundary = state.zones.filter(z => z.polygon && z.polygon.length >= 3);

  zonesWithBoundary.forEach(z => {
    const interns = zoneToInterns[z.name] || [];
    const hasAssignment = interns.length > 0;
    // If multiple interns share a zone, blend by showing the first intern's
    // color as fill and listing all names in the tooltip/label.
    const fillColor = hasAssignment ? colorForIntern(interns[0]) : '#3A3A3A';
    const poly = L.polygon(z.polygon, {
      color: hasAssignment ? fillColor : '#555555',
      weight: hasAssignment ? 3 : 1,
      fillColor: fillColor,
      fillOpacity: hasAssignment ? 0.35 : 0.05,
      dashArray: hasAssignment ? null : '4,4'
    }).addTo(rosterMap);

    const label = hasAssignment
      ? `<strong>${escapeHTML(z.name)}</strong><br>${interns.map(escapeHTML).join(', ')}`
      : `<strong>${escapeHTML(z.name)}</strong><br><span style="opacity:0.7;">Unassigned this shift</span>`;
    poly.bindTooltip(label, { sticky: true });

    // Place a small label marker at the polygon's rough center for readability
    if (hasAssignment) {
      const centerLat = z.polygon.reduce((s, p) => s + p[0], 0) / z.polygon.length;
      const centerLng = z.polygon.reduce((s, p) => s + p[1], 0) / z.polygon.length;
      L.marker([centerLat, centerLng], {
        icon: L.divIcon({
          className: '',
          html: `<div style="background:${fillColor};color:#fff;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.4);">${interns.map(escapeHTML).join(', ')}</div>`,
          iconSize: null
        })
      }).addTo(rosterMap);
    }

    bounds.push(...z.polygon);
  });

  if (bounds.length > 0) {
    rosterMap.fitBounds(bounds, { padding: [40, 40] });
  }

  if (zonesWithBoundary.length === 0) {
    document.getElementById('rosterMapContainer').insertAdjacentHTML('beforeend',
      '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;background:var(--color-bg-subtle);padding:var(--space-4) var(--space-6);border-radius:var(--radius-md);color:var(--color-text-secondary);font-size:14px;max-width:280px;text-align:center;">No zone boundaries drawn yet — draw them on the Map tab to see assignments here</div>');
  }

  setTimeout(() => { if (rosterMap) rosterMap.invalidateSize(); }, 50);
  renderRosterMapLegend(dayAssignments);
}

function renderRosterMapLegend(dayAssignments) {
  const el = document.getElementById('rosterMapLegend');
  if (!el) return;
  const internsToday = [...new Set(dayAssignments.map(a => a.intern))];

function renderAssignedVsActual() {
  const container = document.getElementById('assignedVsActual');
  const dayAssignments = state.assignments.filter(a => a.date === rosterDate);
  const dayVisits = state.visits.filter(v => v.visited_at === rosterDate);

  if (dayAssignments.length === 0) {
    container.innerHTML = '<div class="card empty-state"><p>No assignments set for this date yet.</p></div>';
    return;
  }

  const rows = dayAssignments.map(a => {
    const actualVisits = dayVisits.filter(v => {
      if (v.intern !== a.intern) return false;
      const outlet = state.outlets.find(o => o.id === v.outlet_id);
      return outlet && outlet.zone === a.zone;
    });
    const offZoneVisits = dayVisits.filter(v => {
      if (v.intern !== a.intern) return false;
      const outlet = state.outlets.find(o => o.id === v.outlet_id);
      return outlet && outlet.zone && outlet.zone !== a.zone;
    });
    return { ...a, actualCount: actualVisits.length, offZoneCount: offZoneVisits.length };
  });

  container.innerHTML = `
    <div class="card" style="padding:0;overflow-x:auto;">
      <table>
        <thead><tr><th>Intern</th><th>Assigned Zone</th><th>Shift</th><th>Visits Logged in Zone</th><th>Status</th></tr></thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><strong>${escapeHTML(r.intern)}</strong></td>
              <td class="text-muted">${escapeHTML(r.zone)}</td>
              <td class="text-muted">${escapeHTML(r.shift)}</td>
              <td>${r.actualCount}</td>
              <td>
                ${r.actualCount === 0
                  ? '<span class="pill pill-error">No visits — coverage gap</span>'
                  : '<span class="pill pill-success">Covered</span>'}
                ${r.offZoneCount > 0 ? `<span class="pill pill-warning" style="margin-left:var(--space-2);">${r.offZoneCount} off-zone visit${r.offZoneCount > 1 ? 's' : ''}</span>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function personStatusPill(status) {

function monthlyAttendancePct(personName) {
  const now = new Date();
  const monthPrefix = now.toISOString().slice(0, 7);
  const recs = state.attendance.filter(a => a.person === personName && a.date.startsWith(monthPrefix));
  if (recs.length === 0) return 0;
  const good = recs.filter(a => a.status === 'Present' || a.status === 'Late').length;
  return Math.round((good / recs.length) * 100);
}

/* Late cutoff is the person's assigned shift start for that date if one
   exists, falling back to a default 9:30am cutoff otherwise. */
function computeLateMinutes(personName, date, clockInStr) {
  if (!clockInStr) return 0;
  const shiftType = getEffectiveShiftType(personName, date);
  const cutoffMinutes = shiftType ? timeToMinutes(shiftType.start) : (9 * 60 + 30);
  const clockInMinutes = timeToMinutes(clockInStr);
  return Math.max(0, clockInMinutes - cutoffMinutes);
}
function formatLateMinutes(mins) {
  if (!mins) return '';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m}m late` : `${m}m late`;
}
/* Late/Present are derived from the clock-in time, so they stay live as
   that time changes. Any other status (Half Day / On Leave / Absent) was
   set manually — e.g. in the Attendance tab — and is left untouched. */
function applyClockInStatus(rec, personName, date) {
  if (rec.status && rec.status !== 'Late' && rec.status !== 'Present') return;
  if (!rec.clock_in) { rec.status = ''; return; }
  rec.status = rec.late_minutes > 0 ? 'Late' : 'Present';
}

function attendanceStatusPill(status) {
  if (status === 'Present') return '<span class="pill pill-success">Present</span>';
  if (status === 'Late') return '<span class="pill pill-warning">Late</span>';
  if (status === 'Half Day') return '<span class="pill pill-warning">Half Day</span>';
  if (status === 'On Leave') return '<span class="pill pill-neutral">On Leave</span>';
  if (status === 'Absent') return '<span class="pill pill-error">Absent</span>';
  return '<span class="pill pill-neutral">—</span>';
}

/* ── Day Reports ──
   Same paste-and-parse pipeline as Import Visits/Review Queue, but for
   end-of-day Telegram reports instead of outlet visits. */

const DAY_REPORT_FIELD_SYNONYMS = {
  reporter: ['agent', 'name', 'reported by', 'intern'],
  status: ['status', 'attendance'],
  tasks_done: ['tasks done', 'tasks completed', 'today', 'summary', 'work done'],
  issues: ['issues', 'problems', 'blockers'],
  tomorrow_plan: ['tomorrow', "tomorrow's plan", 'plan', 'next'],
  hours_worked: ['hours', 'hours worked', 'time worked']
};

const DAY_REPORT_LABEL_LOOKUP = (() => {
  const pairs = [];
  for (const [field, labels] of Object.entries(DAY_REPORT_FIELD_SYNONYMS)) {
    for (const label of labels) pairs.push([label, field]);
  }
  pairs.sort((a, b) => b[0].length - a[0].length);
  return pairs;
})();

function findDayReportLabelInLine(line) {
  const cleaned = line.replace(/^[\s•\-\*📍✅➡️▪️]+/, '').trim();
  const m = cleaned.match(/^([A-Za-z][A-Za-z \/']{1,30}?)\s*[:\-]\s*(.*)$/);
  if (!m) return null;
  const rawLabel = m[1].trim().toLowerCase();
  const rest = m[2].trim();
  for (const [label, field] of DAY_REPORT_LABEL_LOOKUP) {
    if (rawLabel === label) return { field, value: rest };
  }
  return null;
}

const DAY_REPORT_STATUS_MAP = {
  present: 'Present', late: 'Late', absent: 'Absent',
  'half day': 'Half Day', 'on leave': 'On Leave', leave: 'On Leave'
};

/* Day reports are normally one-per-pasted-message, but interns
   sometimes stack a few — split blocks the same way visit messages do,
   using a fresh "reporter" line as the block boundary. */
function parseDayReport(rawText) {
  const lines = rawText.split('\n').map(l => l.trimEnd());
  const blocks = [];
  let current = null;

  function pushCurrent() {
    if (current && (current.fields.reporter || current.fields.tasks_done)) blocks.push(current);
    current = null;
  }

  for (let rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    const found = findDayReportLabelInLine(line);
    if (found) {
      if (found.field === 'reporter') {
        pushCurrent();
        current = { fields: {} };
        current.fields.reporter = found.value;
      } else {
        if (!current) current = { fields: {} };
        current.fields[found.field] = found.value;
      }
    } else if (current) {
      if (current.fields.tasks_done !== undefined) {
        current.fields.tasks_done += ' ' + line;
      } else {
        current.fields.tasks_done = line;
      }
    }
  }
  pushCurrent();

  return blocks.map(b => {
    const f = b.fields;
    const matchedPerson = personNames().find(n => normalizeName(n) === normalizeName(f.reporter || ''));
    const rawStatus = (f.status || '').trim().toLowerCase();
    return {
      id: uid(),
      person: matchedPerson || '',
      reporter_raw: (f.reporter || '').trim(),
      status: DAY_REPORT_STATUS_MAP[rawStatus] || 'Present',
      tasks_done: (f.tasks_done || '').trim(),
      issues: (f.issues || '').trim(),
      tomorrow_plan: (f.tomorrow_plan || '').trim(),
      hours_worked: (f.hours_worked || '').trim(),
      date: todayISO(),
      raw_text: rawText.trim()
    };
  });
}

function renderDayReports() {
  const el = document.getElementById('hrTabContent');
  el.innerHTML = `
    <div class="card" style="margin-bottom:var(--space-8);">
      <div class="field">

/* ── Telegram push ── posts directly from the browser to the Telegram Bot
   API using the token saved in Settings (state.telegramConfig); no
   backend involved, same as this app's other client-only integrations. */
async function sendTelegramMessage(text) {
  const cfg = state.telegramConfig;
  if (!cfg.botToken || !cfg.chatId) {
    toast('Set a Telegram bot token and chat ID in Settings first');
    return false;
  }
  try {
    const res = await fetch(`https://api.telegram.org/bot${cfg.botToken}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: cfg.chatId, text })
    });
    const data = await res.json();
    if (!data.ok) { toast(`Telegram error: ${data.description || 'send failed'}`); return false; }
    toast('Pushed to Telegram');
    return true;
  } catch (e) {
    toast('Could not reach Telegram — check your connection');
    return false;
  }
}

function formatTasksMessageForDate(date) {
  const dayTasks = state.tasks.filter(t => t.date === date).sort((a, b) => a.hour.localeCompare(b.hour));
  if (dayTasks.length === 0) return null;
  const lines = dayTasks.map(t => `${t.done ? '✅' : '▫️'} ${t.hour} — ${t.person}: ${t.task}`);
  return `📋 Tasks — ${date}\n${lines.join('\n')}`;
}

/* ── JSON backup import ── reads a file exported by this same app's own
   "Export JSON Backup" button (any version — older exports simply lack
   newer STORAGE_KEYS, which just import zero records for those keys).
   Always merges rather than replaces: records are matched against what's
   already here by id (or by name/string value for id-less records like
   zones/departments/leave types) and only genuinely new ones are added,
   so importing an old backup can't clobber newer data entered since. */

function importRecordKey(item) {
  if (typeof item === 'string') return item;
  if (item && typeof item === 'object') return item.id || item.name || JSON.stringify(item);
  return JSON.stringify(item);
}

function diffImportRecords(parsed) {
  return Object.keys(STORAGE_KEYS).map(key => {
    if (Array.isArray(state[key])) {
      const incoming = Array.isArray(parsed[key]) ? parsed[key] : [];
      const seen = new Set(state[key].map(importRecordKey));
      const newItems = incoming.filter(item => !seen.has(importRecordKey(item)));
      return { key, kind: 'array', incomingCount: incoming.length, newItems };
    }
    // Plain-object keyed settings (e.g. softwareColors) — merge missing keys only,
    // so an old backup can't stomp a color you've already customized since.
    const incomingObj = (parsed[key] && typeof parsed[key] === 'object' && !Array.isArray(parsed[key])) ? parsed[key] : {};
    const current = state[key] || {};
    const newItems = Object.entries(incomingObj).filter(([k]) => !(k in current));
    return { key, kind: 'object', incomingCount: Object.keys(incomingObj).length, newItems };
  }).filter(d => d.incomingCount > 0);
}

function handleImportFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try { parsed = JSON.parse(reader.result); } catch { toast('That file is not valid JSON'); return; }
    if (!parsed || typeof parsed !== 'object') { toast('That file is not valid JSON'); return; }
    openImportPreviewModal(parsed);
  };
  reader.onerror = () => toast('Could not read that file');
  reader.readAsText(file);
}

function openImportPreviewModal(parsed) {
  const diffs = diffImportRecords(parsed);
  if (diffs.length === 0) { toast('No recognizable data found in that file'); return; }

  const totalNew = diffs.reduce((n, d) => n + d.newItems.length, 0);
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h3>Import JSON Backup</h3>
    <p class="text-tertiary text-sm" style="margin-bottom:var(--space-4);">Merges records from the file into what's already here — anything matching an existing outlet/visit/person/etc. by id or name is skipped, so nothing gets duplicated or overwritten.</p>
    <div style="max-height:40vh;overflow-y:auto;">
      <table>
        <thead><tr><th>Data</th><th>In file</th><th>New</th></tr></thead>
        <tbody>
          ${diffs.map(d => `<tr><td>${escapeHTML(STORAGE_LABELS[d.key] || d.key)}</td><td class="text-muted">${d.incomingCount}</td><td>${d.newItems.length ? `<strong>${d.newItems.length}</strong>` : '<span class="text-tertiary">0</span>'}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="cluster gap-3" style="margin-top:var(--space-6);justify-content:flex-end;">
      <button class="btn-ghost btn-sm" id="closeModalBtn">Cancel</button>
      <button class="btn-primary btn-sm" id="confirmImportBtn" ${totalNew === 0 ? 'disabled' : ''}>Import ${totalNew} New ${totalNew === 1 ? 'Record' : 'Records'}</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  if (totalNew > 0) {
    document.getElementById('confirmImportBtn').addEventListener('click', () => commitImport(diffs));
  }
}

function commitImport(diffs) {
  let totalAdded = 0;
  diffs.forEach(({ key, kind, newItems }) => {
    if (kind === 'array') {
      state[key] = (Array.isArray(state[key]) ? state[key] : []).concat(newItems);
    } else {
      state[key] = { ...(state[key] || {}) };
      newItems.forEach(([k, v]) => { state[key][k] = v; });
    }
    totalAdded += newItems.length;
  });
  persist();
  closeModal();
  toast(`Imported ${totalAdded} new ${totalAdded === 1 ? 'record' : 'records'}`);
  renderAll();
}

/* ============================================================
   VIEW: DAY LOGGER
   Per-person hour-by-hour activity timeline, ported from the
   standalone day-tracker app's capture-bar + hour-timeline pattern.
   A compact capture bar logs one entry at a time into the selected
   hour/category; entries autosave into dayLogAutosaves as drafts.
   "Submit Day" moves that person/date's drafts into dayLogHistory.
   The hour timeline renders drafts and submitted entries together
   (draft entries removable, both kinds inline-editable via click).
   ============================================================ */

let daylogPerson = '';
let daylogDate = todayISO();
let daylogCategory = DAYLOG_CATEGORIES[0].value;
let daylogDealExpanded = false;
let daylogExpandedHours = new Set();
let daylogHourActiveCat = {};

function daylogHourSlots() {
  return Array.from({ length: DAYLOG_HOURS_END - DAYLOG_HOURS_START }, (_, i) => {
    const h = DAYLOG_HOURS_START + i;
    const pad = n => String(n).padStart(2, '0');
    return { hour: `${pad(h)}:00`, label: `${pad(h)}:00 – ${pad(h + 1)}:00` };
  });
}

function daylogDefaultHour() {
  const slots = daylogHourSlots();
  const h = new Date().getHours();
  let best = slots[0].hour;
  slots.forEach(s => { if (parseInt(s.hour, 10) <= h) best = s.hour; });
  return best;
}

let daylogSelectedHour = daylogDefaultHour();

function daylogAllEntries(person, date) {
  const drafts = state.dayLogAutosaves.filter(en => en.person === person && en.date === date).map(en => ({ ...en, submitted: false }));
  const subs = state.dayLogHistory.filter(en => en.person === person && en.date === date).map(en => ({ ...en, submitted: true }));
  return drafts.concat(subs);
}

function daylogEntryPlainText(en) {
  switch (en.category) {
    case 'task':   return en.DN ? `[${en.DN}${en.ST ? ' · ' + en.ST : ''}] ${en.NF}` : en.NF;
    case 'call':
    case 'wa':     return en.PHN ? `${en.PHN} · ${en.NF}` : en.NF;
    case 'ticket': if (en.DN || en.AS) return en.NF ? `${en.DN} — ${en.AS} · ${en.NF}` : `${en.DN} — ${en.AS}`;
                   return en.NF;
    case 'other':  return en.NF;
  }
  return '';
}

function daylogEntryLine(en) {
  return escapeHTML(daylogEntryPlainText(en));
}

function daylogEntryLineEditable(en) {
  const v = f => `<span class="daylog-val" data-id="${en.id}" data-field="${f}" data-submitted="${en.submitted ? '1' : '0'}" tabindex="0">${escapeHTML(en[f] || '—')}</span>`;
  switch (en.category) {
    case 'task':   return `[${v('DN')} · ${v('ST')}]  ${v('NF')}`;
    case 'call':
    case 'wa':     return `${v('PHN')}  ·  ${v('NF')}`;
    case 'ticket': return `${v('DN')}  —  ${v('AS')}  ·  ${v('NF')}`;
    case 'other':  return v('NF');
  }
  return '';
}

function daylogFmtHour(hour) {
  const h = parseInt(hour, 10);
  const fmt = x => { const ampm = x < 12 ? 'am' : 'pm'; const h12 = x > 12 ? x - 12 : x; return `${h12}:00${ampm}`; };
  return `${fmt(h)} - ${fmt(h + 1)}`;
}

function renderDaylog() {
  const el = document.getElementById('view-daylog');
  const sortedPeople = [...state.people].sort((a, b) => a.name.localeCompare(b.name));
  if ((!daylogPerson || !findPerson(daylogPerson)) && sortedPeople.length) daylogPerson = sortedPeople[0].name;

  el.innerHTML = `
    <div class="view-header">
      <div><h2>Day Logger</h2><p>Hourly activity log — tasks, calls, tickets, WhatsApp, and other work by person and day.</p></div>
    </div>
    <div class="cluster gap-3" style="margin-bottom:var(--space-6);flex-wrap:wrap;">
      <div class="field" style="min-width:200px;"><label>Person</label>
        <select id="daylogPersonSelect">
          ${sortedPeople.length === 0 ? '<option value="">— no people —</option>' : sortedPeople.map(p => `<option value="${escapeHTML(p.name)}" ${p.name === daylogPerson ? 'selected' : ''}>${escapeHTML(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="min-width:160px;"><label>Date</label><input type="date" id="daylogDateInput" value="${daylogDate}"></div>
    </div>

    daylogDate = e.target.value || todayISO();
    daylogSelectedHour = daylogDefaultHour();
    renderDaylogBody();
  });

  renderDaylogBody();
}

function renderDaylogBody() {
  const el = document.getElementById('daylogBody');
  if (!daylogPerson) {
    el.innerHTML = '<div class="empty-state"><p>Add a person in HR → Directory first.</p></div>';
    return;
  }

  const entries = daylogAllEntries(daylogPerson, daylogDate);
  const totals = { task: 0, call: 0, ticket: 0, wa: 0, other: 0 };
  entries.forEach(en => { if (totals[en.category] !== undefined) totals[en.category]++; });
  const dateLabel = new Date(daylogDate + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' }).toUpperCase();

  el.innerHTML = `
    <div class="card" style="margin-bottom:var(--space-4);">
      <div class="cluster" style="gap:var(--space-5);flex-wrap:wrap;align-items:center;">
        <span style="font-family:var(--font-display);font-size:var(--text-lg);color:var(--color-accent);letter-spacing:0.03em;">${dateLabel}</span>
        ${DAYLOG_CATEGORIES.map(c => `<button type="button" class="daylog-stat-btn" data-cat="${c.value}" style="background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--color-text-tertiary);padding:0;">${DAYLOG_TAB_SHORT_LABELS[c.value]} <b style="color:${totals[c.value] ? 'var(--color-accent)' : 'var(--color-text-secondary)'};">${totals[c.value]}</b></button>`).join('')}
        <span class="text-tertiary mono text-xs" style="margin-left:auto;">${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}</span>
      </div>
    </div>

    <div class="cluster gap-2" style="margin-bottom:var(--space-5);flex-wrap:wrap;">
      <button class="btn-ghost btn-sm" id="daylogSubmitBtn" style="border-color:var(--color-accent);color:var(--color-accent);">Submit Day</button>
      <button class="btn-ghost btn-sm" id="daylogCopyBtn">Copy Report</button>
      <button class="btn-ghost btn-sm" id="daylogClearBtn">Clear Drafts</button>
      <button class="btn-ghost btn-sm" id="daylogBackdateBtn">Backdate</button>
    </div>

    <div class="card" style="margin-bottom:var(--space-6);">
      <form id="daylogCaptureForm" class="cluster gap-2" style="flex-wrap:wrap;align-items:center;">
        <select id="daylogHourSelect" style="${DAYLOG_INPUT_STYLE}width:150px;flex-shrink:0;">
          ${daylogHourSlots().map(s => `<option value="${s.hour}" ${s.hour === daylogSelectedHour ? 'selected' : ''}>${s.label}</option>`).join('')}
        </select>
        <select id="daylogCategorySelect" style="${DAYLOG_INPUT_STYLE}width:150px;flex-shrink:0;">
          ${DAYLOG_CATEGORIES.map(c => `<option value="${c.value}" ${c.value === daylogCategory ? 'selected' : ''}>${c.label}</option>`).join('')}
        </select>
        <div id="daylogCaptureFields" class="cluster gap-2" style="flex:1;flex-wrap:wrap;align-items:center;"></div>
        <button type="button" class="btn-primary btn-sm" id="daylogAddBtn">+ Add</button>
      </form>
    </div>

    <div id="daylogTimeline"></div>
  `;

  daylogRenderCaptureFields();
  daylogRenderTimeline();

  document.getElementById('daylogHourSelect').addEventListener('change', e => { daylogSelectedHour = e.target.value; });
  document.getElementById('daylogCategorySelect').addEventListener('change', e => {
    daylogCategory = e.target.value;
    daylogDealExpanded = false;
    daylogRenderCaptureFields();
  });
  document.getElementById('daylogCaptureForm').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName !== 'SELECT') { e.preventDefault(); document.getElementById('daylogAddBtn').click(); }
  });
  document.getElementById('daylogAddBtn').addEventListener('click', daylogAddEntry);
  document.getElementById('daylogSubmitBtn').addEventListener('click', daylogSubmitDay);
  document.getElementById('daylogCopyBtn').addEventListener('click', daylogCopyReport);
  document.getElementById('daylogClearBtn').addEventListener('click', daylogClearDrafts);
  document.getElementById('daylogBackdateBtn').addEventListener('click', daylogOpenBackdateModal);
  document.querySelectorAll('.daylog-stat-btn').forEach(btn => {
    btn.addEventListener('click', () => daylogOpenCatPopup(btn.dataset.cat));
  });
}

function daylogRenderCaptureFields(preserve) {
  const container = document.getElementById('daylogCaptureFields');
  if (!container) return;
  const cfg = DAYLOG_CATEGORY_FIELDS[daylogCategory];
  const existing = {};
  if (preserve) container.querySelectorAll('.daylog-cap-input').forEach(inp => { existing[inp.dataset.field] = inp.value; });

  const inputHTML = (f, wide) => {
    const req = cfg.required.includes(f);
    const val = existing[f] !== undefined ? existing[f] : (f === 'AS' && daylogCategory === 'ticket' ? daylogPerson : '');
    return `<input type="text" class="daylog-cap-input" data-field="${f}" placeholder="${escapeHTML(DAYLOG_FIELD_LABELS[f])}${req ? ' *' : ''}" value="${escapeHTML(val)}" style="${DAYLOG_INPUT_STYLE}${wide ? 'flex:2;' : 'flex:1;'}min-width:110px;">`;
  };

  let html = cfg.required.map(f => inputHTML(f, daylogCategory === 'other')).join('');
  if (daylogCategory === 'task') {
    html += `<button type="button" class="btn-ghost btn-sm" id="daylogDealToggle" style="${daylogDealExpanded ? 'border-color:var(--color-accent);color:var(--color-accent);' : ''}">+ Deal</button>`;
    if (daylogDealExpanded) html += cfg.optional.map(f => inputHTML(f, false)).join('');
  } else if (cfg.optional.length) {
    html += cfg.optional.map(f => inputHTML(f, false)).join('');
  }

  container.innerHTML = html;
  const first = container.querySelector('input');
  if (first && !preserve) first.focus();

  container.querySelectorAll('.daylog-cap-input').forEach(inp => {
    inp.addEventListener('input', () => inp.classList.remove('daylog-invalid'));
  });

  const dealBtn = document.getElementById('daylogDealToggle');
  if (dealBtn) dealBtn.addEventListener('click', () => {
    daylogDealExpanded = !daylogDealExpanded;
    daylogRenderCaptureFields(true);
    const dn = container.querySelector('[data-field="DN"]');
    if (dn) dn.focus();
  });
}

function daylogAddEntry() {
  const cfg = DAYLOG_CATEGORY_FIELDS[daylogCategory];
  const container = document.getElementById('daylogCaptureFields');
  const values = {};
  container.querySelectorAll('.daylog-cap-input').forEach(inp => { values[inp.dataset.field] = inp.value.trim(); });

  let valid = true;
  cfg.required.forEach(f => {
    if (!values[f]) {
      valid = false;
      const inp = container.querySelector(`[data-field="${f}"]`);
      if (inp) inp.classList.add('daylog-invalid');
    }
  });
  if (!valid) { toast('Fill in the required fields'); return; }

  state.dayLogAutosaves.push({
    id: uid(), person: daylogPerson, date: daylogDate, category: daylogCategory, hour: daylogSelectedHour,
    PHN: values.PHN || '', DN: values.DN || '', ST: values.ST || '', AS: values.AS || '', NF: values.NF || ''
  });
  persist();
  daylogDealExpanded = false;
  toast(`${DAYLOG_TAB_SHORT_LABELS[daylogCategory]} logged`);
  renderDaylogBody();
}

function daylogRenderTimeline() {
  const container = document.getElementById('daylogTimeline');
  if (!container) return;
  const slots = daylogHourSlots();
  const isToday = daylogDate === todayISO();
  const nowHour = new Date().getHours();
  const entries = daylogAllEntries(daylogPerson, daylogDate);

  container.innerHTML = slots.map(slot => {
    const hourEntries = entries.filter(en => en.hour === slot.hour);
    const counts = { task: 0, call: 0, ticket: 0, wa: 0, other: 0 };
    hourEntries.forEach(en => { if (counts[en.category] !== undefined) counts[en.category]++; });
    const isOpen = daylogExpandedHours.has(slot.hour);
    const isCurrent = isToday && parseInt(slot.hour, 10) === nowHour;
    const isEmpty = hourEntries.length === 0;
    const activeTab = daylogHourActiveCat[slot.hour] || DAYLOG_CATEGORIES[0].value;

    return `
      <div class="daylog-hour-row" style="border:1px solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:2px;overflow:hidden;${isCurrent ? 'border-left:2px solid var(--color-accent);' : ''}${isEmpty ? 'opacity:0.55;' : ''}">
        <div class="daylog-hour-toggle" data-hour="${slot.hour}" style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);cursor:pointer;min-height:42px;">
          <span style="font-size:10px;color:var(--color-text-tertiary);display:inline-block;transition:transform var(--transition-fast);${isOpen ? 'transform:rotate(90deg);' : ''}">&#9656;</span>
          <span class="mono" style="font-size:var(--text-xs);color:var(--color-accent);min-width:110px;flex-shrink:0;">${slot.label}</span>
          <div class="cluster gap-2" style="flex:1;flex-wrap:wrap;">
            ${DAYLOG_CATEGORIES.map(c => `<span class="pill ${counts[c.value] ? 'pill-error' : 'pill-neutral'}">${daylogChipLabel(c.value)} ${counts[c.value]}</span>`).join('')}
          </div>
        </div>
        ${isOpen ? daylogRenderHourExpand(slot.hour, hourEntries, activeTab) : ''}
      </div>
    `;
  }).join('');

  container.querySelectorAll('.daylog-hour-toggle').forEach(elm => {
    elm.addEventListener('click', () => {
      const hour = elm.dataset.hour;
      if (daylogExpandedHours.has(hour)) daylogExpandedHours.delete(hour); else daylogExpandedHours.add(hour);
      daylogRenderTimeline();
    });
  });
  container.querySelectorAll('.daylog-hour-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      daylogHourActiveCat[btn.dataset.hour] = btn.dataset.cat;
      daylogRenderTimeline();
    });
  });
  container.querySelectorAll('.daylog-val').forEach(span => {
    span.addEventListener('click', () => daylogStartValEdit(span));
  });
  container.querySelectorAll('.daylog-entry-rm').forEach(btn => {
    btn.addEventListener('click', () => {
      const arrKey = btn.dataset.submitted === '1' ? 'dayLogHistory' : 'dayLogAutosaves';
      state[arrKey] = state[arrKey].filter(en => en.id !== btn.dataset.id);
      persist();
      renderDaylogBody();
    });
  });
}

function daylogChipLabel(cat) {
  return { task: 'T', call: 'C', ticket: 'Tkt', wa: 'WA', other: 'Oth' }[cat] || cat;
}

function daylogRenderHourExpand(hour, hourEntries, activeTab) {
  const tabs = DAYLOG_CATEGORIES.map(c => {
    const count = hourEntries.filter(en => en.category === c.value).length;
    const active = c.value === activeTab;
    return `<button type="button" class="daylog-hour-tab-btn" data-hour="${hour}" data-cat="${c.value}" style="padding:6px 10px;background:transparent;border:none;border-bottom:2px solid ${active ? 'var(--color-accent)' : 'transparent'};color:${active ? 'var(--color-accent)' : 'var(--color-text-tertiary)'};font-size:var(--text-xs);cursor:pointer;white-space:nowrap;">${DAYLOG_TAB_SHORT_LABELS[c.value]} <span style="margin-left:4px;background:var(--color-bg-muted);border-radius:99px;padding:0 5px;font-size:10px;">${count}</span></button>`;
  }).join('');

  const catEntries = hourEntries.filter(en => en.category === activeTab);
  const body = catEntries.length === 0
    ? `<p class="text-tertiary text-xs" style="padding:var(--space-2) 0;">No entries</p>`
    : catEntries.map(en => `
      <div style="display:flex;align-items:baseline;gap:var(--space-2);padding:var(--space-2) 0;border-bottom:1px solid var(--color-border);font-size:var(--text-sm);">
        <span style="flex:1;line-height:1.5;">${daylogEntryLineEditable(en)}</span>
        <button type="button" class="daylog-entry-rm" data-id="${en.id}" data-submitted="${en.submitted ? '1' : '0'}" title="Remove" style="background:none;border:none;color:var(--color-text-tertiary);font-size:16px;line-height:1;cursor:pointer;padding:0 4px;flex-shrink:0;">×</button>
      </div>
    `).join('');

  return `
    <div style="border-top:1px solid var(--color-border);padding:var(--space-3);">
      <div class="cluster" style="border-bottom:1px solid var(--color-border);overflow-x:auto;margin-bottom:var(--space-2);">${tabs}</div>
      <div>${body}</div>
    </div>
  `;
}

function daylogStartValEdit(span) {
  if (span.querySelector('input')) return;
  const submitted = span.dataset.submitted === '1';
  const arr = submitted ? state.dayLogHistory : state.dayLogAutosaves;
  const entry = arr.find(en => en.id === span.dataset.id);
  if (!entry) return;
  const field = span.dataset.field;
  const original = entry[field] || '';
  span.innerHTML = `<input type="text" value="${escapeHTML(original)}" style="${DAYLOG_INPUT_STYLE}min-width:60px;">`;
  const input = span.querySelector('input');
  input.focus();
  input.select();
  const commit = () => {
    entry[field] = input.value.trim();
    persist();
    renderDaylogBody();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); span.textContent = original || '—'; }
  });
}

function daylogOpenCatPopup(cat) {
  const entries = daylogAllEntries(daylogPerson, daylogDate).filter(en => en.category === cat).sort((a, b) => a.hour.localeCompare(b.hour));
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h3>${escapeHTML((DAYLOG_CATEGORIES.find(c => c.value === cat) || {}).label || cat)} — ${entries.length}</h3>
    ${entries.length === 0 ? '<p class="text-tertiary">No entries.</p>' : `
      <div style="max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-1);">
        ${entries.map(en => `<div style="display:flex;gap:var(--space-3);font-size:var(--text-sm);padding:var(--space-2) 0;border-bottom:1px solid var(--color-border);">
          <span class="mono text-tertiary text-xs" style="flex-shrink:0;">${escapeHTML(en.hour)}</span>
          <span>${daylogEntryLine(en)}</span>
        </div>`).join('')}
      </div>
    `}
    <div class="cluster gap-3" style="margin-top:var(--space-6);justify-content:flex-end;">
      <button class="btn-ghost btn-sm" id="closeModalBtn">Close</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
}

function daylogSubmitDay() {
  const drafts = state.dayLogAutosaves.filter(en => en.person === daylogPerson && en.date === daylogDate);
  if (drafts.length === 0) { toast('No entries — nothing to submit'); return; }
  const submittedAt = new Date().toISOString();
  drafts.forEach(en => state.dayLogHistory.push({ ...en, submittedAt }));
  const draftIds = new Set(drafts.map(en => en.id));
  state.dayLogAutosaves = state.dayLogAutosaves.filter(en => !draftIds.has(en.id));
  persist();
  toast(`Day submitted (${drafts.length} ${drafts.length === 1 ? 'entry' : 'entries'})`);
  renderDaylogBody();
}

function daylogClearDrafts() {
  const drafts = state.dayLogAutosaves.filter(en => en.person === daylogPerson && en.date === daylogDate);
  if (drafts.length === 0) { toast('No drafts to clear'); return; }
  if (!confirm(`Clear ${drafts.length} unsubmitted ${drafts.length === 1 ? 'entry' : 'entries'} for ${daylogPerson} on ${daylogDate}? This can't be undone.`)) return;
  const draftIds = new Set(drafts.map(en => en.id));
  state.dayLogAutosaves = state.dayLogAutosaves.filter(en => !draftIds.has(en.id));
  persist();
  toast('Drafts cleared');
  renderDaylogBody();
}

function daylogCopyReport() {
  const entries = daylogAllEntries(daylogPerson, daylogDate);
  if (entries.length === 0) { toast('No entries to copy'); return; }

  const dateStr = new Date(daylogDate + 'T00:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const lines = [`${daylogPerson} — ${dateStr}`, ''];
  const totals = { task: 0, call: 0, ticket: 0, wa: 0, other: 0 };

  daylogHourSlots().forEach(slot => {
    const hourEntries = entries.filter(en => en.hour === slot.hour);
    if (hourEntries.length === 0) return;
    lines.push(daylogFmtHour(slot.hour));
    DAYLOG_CATEGORIES.forEach(c => {
      const catEntries = hourEntries.filter(en => en.category === c.value);
      if (catEntries.length === 0) return;
      lines.push(`${DAYLOG_TAB_SHORT_LABELS[c.value]}: ${catEntries.length}`);
      catEntries.forEach(en => lines.push(`• ${daylogEntryPlainText(en)}`));
      totals[c.value] += catEntries.length;
    });
    lines.push('');
  });

  lines.push('── Day Totals ──');
  lines.push(`Tasks: ${totals.task}  |  Calls: ${totals.call}  |  Tickets: ${totals.ticket}  |  WA: ${totals.wa}  |  Other: ${totals.other}`);
  lines.push(`Total entries: ${entries.length}`);

  navigator.clipboard.writeText(lines.join('\n')).then(() => toast('Report copied')).catch(() => toast('Copy failed'));
}

function daylogOpenBackdateModal() {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h3>Backdate Entry</h3>
    <p class="text-tertiary text-sm" style="margin-bottom:var(--space-4);">Log counts for a past day without hour-by-hour detail. Adds placeholder entries straight into ${escapeHTML(daylogPerson)}'s submitted history.</p>
    <div class="field" style="margin-bottom:var(--space-3);"><label>Date</label><input type="date" id="bdDate" value="${daylogDate}" max="${todayISO()}"></div>
    <div class="grid-3" style="gap:var(--space-3);margin-bottom:var(--space-3);">
      <div class="field"><label>Tasks</label><input type="number" id="bdTask" min="0" value="0"></div>
      <div class="field"><label>Calls</label><input type="number" id="bdCall" min="0" value="0"></div>
      <div class="field"><label>WhatsApp</label><input type="number" id="bdWa" min="0" value="0"></div>
    </div>
    <div class="grid-3" style="gap:var(--space-3);margin-bottom:var(--space-3);">
      <div class="field"><label>Tickets</label><input type="number" id="bdTicket" min="0" value="0"></div>
      <div class="field"><label>Other</label><input type="number" id="bdOther" min="0" value="0"></div>
    </div>
    <div class="field" style="margin-bottom:var(--space-5);"><label>Note (optional)</label><input type="text" id="bdNote" placeholder="e.g. Leave day, offline visits"></div>
    <div class="cluster gap-3" style="justify-content:flex-end;">
      <button class="btn-ghost btn-sm" id="closeModalBtn">Cancel</button>
      <button class="btn-primary btn-sm" id="saveBackdateBtn">Save</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('saveBackdateBtn').addEventListener('click', () => {
    const date = document.getElementById('bdDate').value || daylogDate;
    const note = document.getElementById('bdNote').value.trim() || '(backdated — no detail)';
    const counts = {
      task: parseInt(document.getElementById('bdTask').value, 10) || 0,
      call: parseInt(document.getElementById('bdCall').value, 10) || 0,
      wa: parseInt(document.getElementById('bdWa').value, 10) || 0,
      ticket: parseInt(document.getElementById('bdTicket').value, 10) || 0,
      other: parseInt(document.getElementById('bdOther').value, 10) || 0
    };
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (total === 0) { toast('Enter at least one count'); return; }
    const submittedAt = new Date().toISOString();
    const hour = daylogHourSlots()[0].hour;
    Object.keys(counts).forEach(cat => {
      for (let i = 0; i < counts[cat]; i++) {
        state.dayLogHistory.push({ id: uid(), person: daylogPerson, date, category: cat, hour, PHN: '', DN: '', ST: '', AS: '', NF: note, submittedAt, backdated: true });
      }
    });
    persist();
    closeModal();
    toast(`Backdated ${total} ${total === 1 ? 'entry' : 'entries'} for ${date}`);
    daylogDate = date;
    daylogSelectedHour = daylogDefaultHour();
    renderDaylog();
  });
}

function updateNavCounts() {
  // could add badges later; kept simple for now
}

/* Keeps the software <datalist> in sync: baseline options plus anything
   already typed/parsed across outlets and visits, so free-text entries
   like "POSbytz" become quick-pick suggestions everywhere after first use. */
function refreshSoftwareSuggestions() {
  const dl = document.getElementById('softwareSuggestions');
  if (!dl) return;
  const seen = new Set(SOFTWARE_OPTIONS);
  state.outlets.forEach(o => { if (o.current_software) seen.add(o.current_software); });
  state.visits.forEach(v => { if (v.software_reported) seen.add(v.software_reported); });
  dl.innerHTML = [...seen].map(s => `<option value="${escapeHTML(s)}">`).join('');
}

function renderAll() {
  renderIngest();
  renderReview();
  renderOutlets();
  renderInterns();
  renderSoftware();
  renderRoster();
  renderHR();
  renderSettings();
  updateNavCounts();
  refreshSoftwareSuggestions();
}

document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-item');
  if (!btn) return;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const view = btn.dataset.view;
  document.getElementById('view-' + view).classList.add('active');

  if (view === 'ingest') renderIngest();
  if (view === 'review') renderReview();
  if (view === 'map') renderMap();
  if (view === 'outlets') renderOutlets();
  if (view === 'interns') renderInterns();
  if (view === 'software') renderSoftware();
  if (view === 'roster') renderRoster();
  if (view === 'hr') renderHR();
  if (view === 'daylog') renderDaylog();
  if (view === 'settings') renderSettings();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});

document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
applyTheme(getTheme());

renderAll();
