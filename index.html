      const rec = getOrCreateAttendance(draft.person, draft.date);
      rec.status = draft.status;
      state.dayReportDrafts = state.dayReportDrafts.filter(d => d.id !== draft.id);
      persist();
      toast('Day report saved');
      renderDayReports();
    });
    list.appendChild(card);
  });
}

/* ── Leave & Absences ── */

function renderLeave() {
  const el = document.getElementById('hrTabContent');
  const sorted = [...state.leaveRequests].sort((a, b) => b.start_date.localeCompare(a.start_date));
  el.innerHTML = `
    <div class="cluster gap-3" style="justify-content:flex-end;margin-bottom:var(--space-5);">
      <button class="btn-primary btn-sm" id="addLeaveBtn">+ Request Leave</button>
    </div>
    <div class="card" style="padding:0;overflow-x:auto;">
      ${sorted.length === 0 ? '<div class="empty-state"><p>No leave requests yet.</p></div>' : `
      <table>
        <thead><tr><th>Person</th><th>Type</th><th>Start</th><th>End</th><th>Reason</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${sorted.map(l => `
            <tr>
              <td><strong>${escapeHTML(l.person)}</strong></td>
              <td class="text-muted">${escapeHTML(l.type)}</td>
              <td class="text-muted">${escapeHTML(l.start_date)}</td>
              <td class="text-muted">${escapeHTML(l.end_date)}</td>
              <td class="text-sm">${escapeHTML(l.reason || '—')}</td>
              <td>${leaveStatusPill(l.status)}</td>
              <td>
                ${l.status === 'pending' ? `
                  <div class="cluster gap-2">
                    <button class="btn-ghost btn-sm approve-leave-btn" data-id="${l.id}">Approve</button>
                    <button class="btn-ghost btn-sm reject-leave-btn" data-id="${l.id}">Reject</button>
                  </div>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`}
    </div>
  `;
  document.getElementById('addLeaveBtn').addEventListener('click', openLeaveModal);
  document.querySelectorAll('.approve-leave-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = state.leaveRequests.find(x => x.id === btn.dataset.id);
      l.status = 'approved';
      applyApprovedLeaveToAttendance(l);
      persist();
      toast('Leave approved');
      renderLeave();
    });
  });
  document.querySelectorAll('.reject-leave-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = state.leaveRequests.find(x => x.id === btn.dataset.id);
      l.status = 'rejected';
      persist();
      toast('Leave rejected');
      renderLeave();
    });
  });
}

function leaveStatusPill(status) {
  if (status === 'approved') return '<span class="pill pill-success">Approved</span>';
  if (status === 'rejected') return '<span class="pill pill-error">Rejected</span>';
  return '<span class="pill pill-warning">Pending</span>';
}

function openLeaveModal() {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="cluster gap-3" style="justify-content:space-between;margin-bottom:var(--space-6);">
      <h3>Request Leave</h3>
      <button class="btn-ghost btn-sm" id="closeModalBtn">Close</button>
    </div>
    <div class="grid-2 gap-4">
      <div class="field"><label>Person</label>
        <select id="leavePerson">${personNames().map(n => `<option value="${n}">${n}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Leave Type</label>
        <select id="leaveType">${state.leaveTypes.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Start Date</label><input type="date" id="leaveStart"></div>
      <div class="field"><label>End Date</label><input type="date" id="leaveEnd"></div>
    </div>
    <div class="field" style="margin-top:var(--space-4);"><label>Reason</label><textarea id="leaveReason" rows="2"></textarea></div>
    <div class="cluster gap-3" style="margin-top:var(--space-6);justify-content:flex-end;">
      <button class="btn-primary btn-sm" id="saveLeaveBtn">Submit</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('saveLeaveBtn').addEventListener('click', () => {
    const start = document.getElementById('leaveStart').value;
    const end = document.getElementById('leaveEnd').value;
    if (!start || !end) { toast('Start and end dates are required'); return; }
    if (end < start) { toast('End date must be on or after start date'); return; }
    state.leaveRequests.push({
      id: uid(),
      person: document.getElementById('leavePerson').value,
      type: document.getElementById('leaveType').value,
      start_date: start,
      end_date: end,
      status: 'pending',
      reason: document.getElementById('leaveReason').value.trim()
    });
    persist();
    toast('Leave request submitted');
    closeModal();
    renderLeave();
  });
}

/* ── Tasks ── freetext task assigned to a person at a specific hour, with a completion checkbox ── */

let taskViewDate = todayISO();

function renderHRTasks() {
  const el = document.getElementById('hrTabContent');
  const dayTasks = state.tasks
    .filter(t => t.date === taskViewDate)
    .sort((a, b) => a.hour.localeCompare(b.hour));

  el.innerHTML = `
    <div class="cluster gap-3" style="justify-content:space-between;margin-bottom:var(--space-5);flex-wrap:wrap;">
      <div class="field" style="min-width:180px;"><label>Date</label><input type="date" id="taskDateInput" value="${taskViewDate}"></div>
      <button class="btn-primary btn-sm" id="addTaskBtn">+ Assign Task</button>
    </div>
    <div class="card" style="padding:0;overflow-x:auto;">
      ${dayTasks.length === 0 ? '<div class="empty-state"><p>No tasks assigned for this date yet.</p></div>' : `
      <table>
        <thead><tr><th></th><th>Hour</th><th>Person</th><th>Task</th><th></th></tr></thead>
        <tbody>
          ${dayTasks.map(t => `
            <tr style="${t.done ? 'opacity:0.6;' : ''}">
              <td><input type="checkbox" class="task-done-checkbox" data-id="${t.id}" ${t.done ? 'checked' : ''}></td>
              <td class="text-muted">${escapeHTML(t.hour)}</td>
              <td><strong>${escapeHTML(t.person)}</strong></td>
              <td class="text-sm" style="${t.done ? 'text-decoration:line-through;' : ''}">${escapeHTML(t.task)}</td>
              <td><button class="btn-ghost btn-sm remove-task-btn" data-id="${t.id}">Remove</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`}
    </div>
  `;

  document.getElementById('taskDateInput').addEventListener('change', e => {
    taskViewDate = e.target.value;
    renderHRTasks();
  });
  document.getElementById('addTaskBtn').addEventListener('click', openTaskModal);
  document.querySelectorAll('.task-done-checkbox').forEach(cb => {
    cb.addEventListener('change', () => {
      const t = state.tasks.find(x => x.id === cb.dataset.id);
      t.done = cb.checked;
      persist();
      renderHRTasks();
    });
  });
  document.querySelectorAll('.remove-task-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tasks = state.tasks.filter(t => t.id !== btn.dataset.id);
      persist();
      toast('Task removed');
      renderHRTasks();
    });
  });
}

function openTaskModal() {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="cluster gap-3" style="justify-content:space-between;margin-bottom:var(--space-6);">
      <h3>Assign Task</h3>
      <button class="btn-ghost btn-sm" id="closeModalBtn">Close</button>
    </div>
    <div class="grid-2 gap-4">
      <div class="field"><label>Person</label>
        <select id="taskPerson">${personNames().map(n => `<option value="${n}">${n}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Hour</label>
        <select id="taskHour">${HOUR_OPTIONS.map(h => `<option value="${h}" ${h === '09:00' ? 'selected' : ''}>${h}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Date</label><input type="date" id="taskDate" value="${taskViewDate}"></div>
    </div>
    <div class="field" style="margin-top:var(--space-4);"><label>Task</label><textarea id="taskText" rows="2" placeholder="e.g. Call 3 pending outlets in Hulhumalé"></textarea></div>
    <div class="cluster gap-3" style="margin-top:var(--space-6);justify-content:flex-end;">
      <button class="btn-primary btn-sm" id="saveTaskBtn">Assign</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('saveTaskBtn').addEventListener('click', () => {
    const task = document.getElementById('taskText').value.trim();
    const date = document.getElementById('taskDate').value;
    if (!task) { toast('Task text is required'); return; }
    if (!date) { toast('Date is required'); return; }
    state.tasks.push({
      id: uid(),
      person: document.getElementById('taskPerson').value,
      date,
      hour: document.getElementById('taskHour').value,
      task,
      done: false,
      created_at: nowISO()
    });
    persist();
    toast('Task assigned');
    closeModal();
    taskViewDate = date;
    renderHRTasks();
  });
}

/* ── Today's Assignment ── read-only join of assignments + attendance ── */

function renderTodayAssignment() {
  const el = document.getElementById('hrTabContent');
  const date = todayISO();
  const dayAssignments = state.assignments.filter(a => a.date === date);

  el.innerHTML = `
    <p class="text-sm text-muted" style="margin-bottom:var(--space-5);">Today — ${date}</p>
    <div class="card" style="padding:0;overflow-x:auto;">
      ${dayAssignments.length === 0 ? '<div class="empty-state"><p>No shift assignments set for today yet — set them in Shift Roster.</p></div>' : `
      <table>
        <thead><tr><th>Person</th><th>Assigned Zone</th><th>Shift</th><th>Attendance</th><th>Clocked In</th></tr></thead>
        <tbody>
          ${dayAssignments.map(a => {
            const rec = state.attendance.find(x => x.person === a.intern && x.date === date);
            return `
              <tr>
                <td><strong>${escapeHTML(a.intern)}</strong></td>
                <td class="text-muted">${escapeHTML(a.zone)}</td>
                <td class="text-muted">${escapeHTML(a.shift)}</td>
                <td>${rec && rec.status ? attendanceStatusPill(rec.status) : '<span class="pill pill-neutral">Not clocked in</span>'}</td>
                <td class="text-muted">${rec && rec.clock_in ? escapeHTML(rec.clock_in) : '—'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

/* ============================================================
   VIEW: SETTINGS
   ============================================================ */

function renderSettings() {
  const el = document.getElementById('view-settings');
  el.innerHTML = `
    <div class="view-header"><div><h2>Settings</h2><p>Manage shared reference lists. People are managed from HR &rarr; Directory. Data lives only in this browser's localStorage.</p></div></div>

    <div class="grid-2 gap-6">
      <div class="card">
        <strong>Zones (with region)</strong>
        <div class="stack gap-2" id="zoneList" style="margin-top:var(--space-4);"></div>
        <div class="cluster gap-2" style="margin-top:var(--space-4);flex-wrap:wrap;">
          <input type="text" id="newZoneInput" placeholder="Zone name" style="flex:1;min-width:100px;background:var(--color-bg-muted);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--color-text-primary);">
          <input type="text" id="newRegionInput" placeholder="Region (island)" style="flex:1;min-width:100px;background:var(--color-bg-muted);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--color-text-primary);">
          <button class="btn-ghost btn-sm" id="addZoneBtn">Add</button>
        </div>
      </div>

      <div class="card">
        <strong>Departments</strong>
        <div class="stack gap-2" id="departmentList" style="margin-top:var(--space-4);"></div>
        <div class="cluster gap-2" style="margin-top:var(--space-4);">
          <input type="text" id="newDepartmentInput" placeholder="Department name" style="flex:1;background:var(--color-bg-muted);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--color-text-primary);">
          <button class="btn-ghost btn-sm" id="addDepartmentBtn">Add</button>
        </div>
      </div>

      <div class="card">
        <strong>Leave Types</strong>
        <div class="stack gap-2" id="leaveTypeList" style="margin-top:var(--space-4);"></div>
        <div class="cluster gap-2" style="margin-top:var(--space-4);">
          <input type="text" id="newLeaveTypeInput" placeholder="Leave type" style="flex:1;background:var(--color-bg-muted);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--color-text-primary);">
          <button class="btn-ghost btn-sm" id="addLeaveTypeBtn">Add</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:var(--space-8);">
      <strong>Data</strong>
      <p class="text-sm text-muted" style="margin-top:var(--space-2);margin-bottom:var(--space-4);">Everything is stored in this browser only. Export a backup or clear all data.</p>
      <div class="cluster gap-3">
        <button class="btn-ghost btn-sm" id="exportBtn">Export JSON Backup</button>
        <button class="btn-ghost btn-sm" id="clearAllBtn" style="color:var(--color-error);">Clear All Data</button>
      </div>
    </div>
  `;

  document.getElementById('zoneList').innerHTML = state.zones.map(z => `
    <div class="cluster gap-2" style="justify-content:space-between;">
      <span class="text-sm">${escapeHTML(z.name)} <span class="text-tertiary">(${escapeHTML(z.region)})</span>${!z.polygon ? ' <span class="pill pill-neutral">no boundary</span>' : ' <span class="pill pill-success">drawn</span>'}</span>
      <button class="btn-ghost btn-sm remove-zone-btn" data-name="${escapeHTML(z.name)}">Remove</button>
    </div>`).join('');
  document.getElementById('departmentList').innerHTML = state.departments.map(d => `
    <div class="cluster gap-2" style="justify-content:space-between;">
      <span class="text-sm">${escapeHTML(d)}</span>
      <button class="btn-ghost btn-sm remove-department-btn" data-name="${escapeHTML(d)}">Remove</button>
    </div>`).join('');
  document.getElementById('leaveTypeList').innerHTML = state.leaveTypes.map(t => `
    <div class="cluster gap-2" style="justify-content:space-between;">
      <span class="text-sm">${escapeHTML(t)}</span>
      <button class="btn-ghost btn-sm remove-leave-type-btn" data-name="${escapeHTML(t)}">Remove</button>
    </div>`).join('');

  document.getElementById('addZoneBtn').addEventListener('click', () => {
    const name = document.getElementById('newZoneInput').value.trim();
    const region = document.getElementById('newRegionInput').value.trim();
    if (!name || !region) { toast('Zone and region both required'); return; }
    state.zones.push({ name, region });
    persist(); renderSettings();
  });
  document.getElementById('addDepartmentBtn').addEventListener('click', () => {
    const val = document.getElementById('newDepartmentInput').value.trim();
    if (!val) return;
    if (!state.departments.includes(val)) state.departments.push(val);
    persist(); renderSettings();
  });
  document.getElementById('addLeaveTypeBtn').addEventListener('click', () => {
    const val = document.getElementById('newLeaveTypeInput').value.trim();
    if (!val) return;
    if (!state.leaveTypes.includes(val)) state.leaveTypes.push(val);
    persist(); renderSettings();
  });
  document.querySelectorAll('.remove-zone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.zones = state.zones.filter(z => z.name !== btn.dataset.name);
      persist(); renderSettings();
    });
  });
  document.querySelectorAll('.remove-department-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.departments = state.departments.filter(d => d !== btn.dataset.name);
      persist(); renderSettings();
    });
  });
  document.querySelectorAll('.remove-leave-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.leaveTypes = state.leaveTypes.filter(t => t !== btn.dataset.name);
      persist(); renderSettings();
    });
  });
  document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `visit-intel-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('clearAllBtn').addEventListener('click', () => {
    if (!confirm('This will permanently delete all outlets, visits, assignments, attendance, day reports, and leave requests. Continue?')) return;
    state = {
      outlets: [], visits: [], assignments: [],
      people: state.people, departments: state.departments,
      zones: state.zones, drafts: [],
      attendance: [], dayReportDrafts: [], dayReports: [],
      leaveTypes: state.leaveTypes, leaveRequests: [],
      tasks: []
    };
    persist();
    toast('All data cleared');
    renderAll();
  });
}

/* ============================================================
   NAV / APP WIRING
   ============================================================ */

function updateNavCounts() {
  // could add badges later; kept simple for now
}

/* Keeps the software <datalist> in sync: baseline options plus anything
   already typed/parsed across outlets and visits, so free-text entries
   like "POSbytz" become quick-pick suggestions everywhere after first use. */
function refreshSoftwareSuggestions() {
  const dl = document.getElementById('softwareSuggestions');
  if (!dl) return;
  const seen = new Set(SOFTWARE_OPTIONS);
  state.outlets.forEach(o => { if (o.current_software) seen.add(o.current_software); });
  state.visits.forEach(v => { if (v.software_reported) seen.add(v.software_reported); });
  dl.innerHTML = [...seen].map(s => `<option value="${escapeHTML(s)}">`).join('');
}

function renderAll() {
  renderIngest();
  renderReview();
  renderOutlets();
  renderInterns();
  renderSoftware();
  renderRoster();
  renderHR();
  renderSettings();
  updateNavCounts();
  refreshSoftwareSuggestions();
}

document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-item');
  if (!btn) return;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const view = btn.dataset.view;
  document.getElementById('view-' + view).classList.add('active');

  if (view === 'ingest') renderIngest();
  if (view === 'review') renderReview();
  if (view === 'map') renderMap();
  if (view === 'outlets') renderOutlets();
  if (view === 'interns') renderInterns();
  if (view === 'software') renderSoftware();
  if (view === 'roster') renderRoster();
  if (view === 'hr') renderHR();
  if (view === 'settings') renderSettings();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});

document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
applyTheme(getTheme());

renderAll();
</script>
